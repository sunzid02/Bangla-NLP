## 7. Research Problems Studied

1. LLM capability evaluation on Bangla NLP tasks
2. Social/gender bias measurement in Bangla pretrained language models
3. Back-transliteration of romanized Bangla to standard script
4. Dialectal machine translation (Chittagong/Sylhet ↔ Standard Bangla / English)
5. Cultural and linguistic knowledge benchmarking for LLMs in Bengali
6. Text-based hate speech detection (binary + fine-grained + target identification)
7. Multimodal hate detection in Bangla memes (text + image)
8. Joint claim checkworthiness detection + sentiment analysis in Bengali news
9. Real-time dialect-aware automatic speech recognition for Bengali
10. Cross-lingual multi-step reasoning evaluation in Bangla
11. Necessity/viability of a dedicated Bengali LLM vs English-centric LLMs
12. Figures-of-speech identification in Bengali literature
13. Byte-level language modelling for morphologically rich Bangla
14. Large-scale, validated Bangla Named Entity Recognition
15. Bengali chart-to-text summarization
16. Political stance detection in Bangladeshi political discourse
17. Political bias detection in Bangla news (ternary stance)
18. Bangla image captioning (multimodal generation)
19. LLM benchmarking on Bangla physics QA with cross-lingual consistency
20. Parallel-corpus construction and MT for the endangered Chakma language

## 9. Common Models and Methods

**Encoder models:** BanglaBERT, IndicBERTv2, MuRIL, mDeBERTa, BanglishBERT, XLM-RoBERTa, BERT-CRF

**Generative LLMs:** ChatGPT (GPT-3.5), LLaMA-2, Claude-2, GPT-4/4o/4.1, Claude-3.5-Sonnet, Gemini-1.5-Pro/2.5-Pro/2.5-Flash, LLaMA-3-8B/70B, LLaMA-3.1-8B, LLaMA-3.3-70B, Qwen-2/2.5/3 (up to 235B), Gemma-2b/3-12B, Phi-4-14B, Mistral-7B/Large, DeepSeekV3, DeepSeek-R1, Aya-23

**Seq2Seq / byte-level / MT models:** mBART-50, NLLB-200, mT5, BanglaT5, BanglaByT5, IndicBART, BLOOM, GPT-2, Paramanu

**Speech models:** IndicWav2Vec, VITS-Bengali TTS

**Adaptation methods:** LoRA/QLoRA, zero-shot/few-shot prompting, Chain-of-Thought, MTL, KG retrieval (Neo4j), BanNERCEM, WEAT/SEAT bias metrics

## 10. Research Gaps

| Gap Type | Description | Relevant Papers |
|----------|-------------|-----------------|
| Dataset Gap | NER addressed by BanNERD; coreference, dialogue, math reasoning still lack data | 4, 10, 14 |
| Benchmark Gap | No unified multi-task Bangla benchmark comparable to GLUE/SuperGLUE | 1, 5, 11, 15, 17, 19 |
| Model Gap | No dedicated Bangla instruction-tuned LLM; BanglaByT5 is a step but small | 1, 5, 11, 13 |
| Tokenization Gap | English-centric subword tokenizers fragment Bangla script | 11, 13 |
| Evaluation Gap | Inconsistent metrics; no standard Bangla eval protocol | 2, 6, 7, 10, 19 |
| Low-Resource / Dialect Gap | Only Chittagong/Sylhet covered; Chakma just started; diaspora ignored | 4, 9, 20 |
| Domain Gap | Scientific QA started; medical, legal, financial domains absent | 11, 19 |
| Multimodal Gap | Only hateful memes and image captioning; no Bangla VLM or VQA | 7, 15, 18 |
| Practical Deployment Gap | Only BanglaTalk is a deployed system | 9 |

---

## 11. Possible Thesis Directions

1. **Unified Bangla Benchmark:** Multi-task evaluation suite (NLU, generation, reasoning, cultural knowledge).
2. **Instruction-Tuned Bangla LLM:** Fine-tune LLaMA/Mistral on Bangla instruction data; evaluate on BenLLM-Eval and BLUCK.
3. **Dialectal NLP Expansion:** Extend BhasaBodh to more dialects beyond Chittagong/Sylhet.
4. **Bias Mitigation:** Intersectional bias (gender × religion × dialect) and debiasing strategies.
5. **Domain-Specific NLP:** First Bangla NLP corpus and models for medical or legal domains.
6. **Multimodal Bangla NLP:** Extend BanHateME to VQA, image captioning using low-resource multimodal data.

let currentMode = 'edit';
let content = RAW;

const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const nav = document.getElementById('nav');
const sectionLabel = document.getElementById('section-label');

editor.value = content;

function buildNav() {
  const lines = content.split('\n');
  const headings = [];
  lines.forEach((line, i) => {
    const m = line.match(/^(#{1,3})\s+(.+)/);
    if (m) headings.push({level: m[1].length, text: m[2].replace(/\*\*/g,''), line: i});
  });
  nav.innerHTML = '';
  headings.forEach((h, idx) => {
    const el = document.createElement('div');
    el.className = 'nav-item';
    el.style.paddingLeft = (8 + (h.level-1)*10) + 'px';
    el.style.fontSize = h.level === 1 ? '13px' : h.level === 2 ? '12.5px' : '12px';
    el.textContent = h.text.length > 28 ? h.text.slice(0,26)+'…' : h.text;
    el.onclick = () => jumpTo(h, el);
    nav.appendChild(el);
  });
}

function jumpTo(h, el) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  sectionLabel.textContent = h.text.replace(/\*\*/g,'');
  if (currentMode === 'edit') {
    const lines = editor.value.split('\n');
    let pos = 0;
    for (let i = 0; i < h.line; i++) pos += lines[i].length + 1;
    editor.focus();
    editor.setSelectionRange(pos, pos + lines[h.line].length);
    const lh = 20;
    editor.scrollTop = Math.max(0, h.line * lh - 120);
  } else {
    const anchors = preview.querySelectorAll('h1,h2,h3');
    const clean = h.text.replace(/\*\*/g,'').replace(/⚠/g,'').trim().toLowerCase();
    for (const a of anchors) {
      if (a.textContent.replace(/⚠/g,'').trim().toLowerCase().includes(clean.slice(0,15))) {
        a.scrollIntoView({behavior:'smooth', block:'start'});
        break;
      }
    }
  }
}

function toggleMode() {
  if (currentMode === 'edit') {
    content = editor.value;
    preview.innerHTML = marked.parse(content);
    editor.style.display = 'none';
    preview.style.display = 'block';
    document.getElementById('mode-btn').textContent = 'Edit';
    currentMode = 'preview';
  } else {
    editor.style.display = 'block';
    preview.style.display = 'none';
    document.getElementById('mode-btn').textContent = 'Preview';
    currentMode = 'edit';
  }
}

function saveEdit() {
  content = editor.value;
  buildNav();
  const summary = content.slice(0, 200).replace(/\n/g,' ');
  sendPrompt('I edited the literature review. Here is the updated content (first 200 chars): ' + summary + ' — please acknowledge and help me refine it further if needed.');
}

function updateStats() {
  const txt = editor.value;
  const lines = txt.split('\n').length;
  const words = txt.trim() ? txt.trim().split(/\s+/).length : 0;
  const chars = txt.length;
  document.getElementById('stat-lines').textContent = 'Lines: ' + lines;
  document.getElementById('stat-words').textContent = 'Words: ' + words;
  document.getElementById('stat-chars').textContent = 'Chars: ' + chars;
}

editor.addEventListener('input', () => { content = editor.value; updateStats(); });

buildNav();
updateStats();
</script>
